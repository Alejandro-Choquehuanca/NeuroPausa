<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NeuroPausa</title>
    <link rel="stylesheet" href="assets/styles/login.css">
</head>
<body>

<div class="login-container">

    <!-- Lado izquierdo -->
    <div class="login-box">

        <div class="logo-box">
            <img src="assets/images/ImagenNeuroPausaLogo.png" alt="NeuroPausa">
            <h1>NeuroPausa</h1>
            <p>Acompañándote en tu transición hacia el bienestar</p>
        </div>

        <form class="login-form">
            <div class="input-box">
                <input type="email" placeholder="Email" required>
            </div>

            <div class="input-box">
                <input type="password" placeholder="Contraseña" required>
            </div>

            <a href="#" class="forgot">¿Olvidaste tu contraseña?</a>

            <button type="submit">Iniciar sesión</button>

            <div class="register">
                ¿No tienes cuenta?
                <a href="#">Regístrate</a>
            </div>
        </form>

    </div>

    <!-- Lado derecho desktop -->
    <div class="login-side">
        <div class="overlay">
            <h2>Bienvenida a NeuroPausa</h2>
            <p>Tu espacio seguro para bienestar hormonal, emocional y mental.</p>
        </div>
    </div>

</div>

</body>
</html>
